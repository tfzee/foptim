import os
import lit.util
import lit.formats

sys.path.insert(0, os.path.dirname(__file__))
import lit_test_formats

loaded_site_cfg = getattr(config, "loaded_site_config", False)
if not loaded_site_cfg:
    site_cfg = lit_config.params.get("foptim_site_config", None)
    if site_cfg and os.path.exists(site_cfg):
        lit_config.load_config(config, site_cfg)
        raise SystemExit

config.name = "benchy"
config.test_format = lit_test_formats.MultiFormat()
config.suffixes = [".c", ".cpp", ".cc"]
config.excludes = ["Output", "gcc_torture_execute_disabled"]

config.test_source_root = os.path.dirname(__file__)
config.test_exec_root = os.path.join(config.foptim_bin_dir, 'test')

config.substitutions.append(('%foffcc', '{}/foptim_main'.format(config.foptim_bin_dir)))

